<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Furkan Portakal - building AI-native products at scale</title>
  <defs>
    <radialGradient id="glow" cx="82%" cy="115%" r="60%">
      <stop offset="0%" stop-color="#e67e22" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e67e22" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>
    <clipPath id="round"><rect width="800" height="200" rx="16"/></clipPath>
    <radialGradient id="orange" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f7a04b"/>
      <stop offset="55%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#c85f12"/>
    </radialGradient>
  </defs>
  <rect width="800" height="200" rx="16" fill="#0d1117"/>
  <g clip-path="url(#round)">
    <rect width="800" height="200" fill="url(#grid)"/>
    <rect width="800" height="200" fill="url(#glow)"/>
  </g>
  <rect x="0.5" y="0.5" width="799" height="199" rx="16" fill="none" stroke="#1f242c"/>
  <g transform="translate(96 100)">
    <circle r="40" fill="url(#orange)"/>
    <circle r="40" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
    <ellipse cx="-13" cy="-14" rx="12" ry="8" fill="#ffffff" fill-opacity="0.18"/>
    <path d="M2 -40 C 2 -50, 10 -54, 16 -50" fill="none" stroke="#4a7c34" stroke-width="4" stroke-linecap="round"/>
    <path d="M6 -44 C 16 -52, 30 -50, 34 -40 C 24 -40, 12 -42, 6 -44 Z" fill="#5a9440"/>
  </g>
  <text x="168" y="88" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#f0f6fc">Furkan Portakal<tspan fill="#e67e22">.</tspan></text>
  <text x="169" y="120" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" fill="#c9d1d9">building <tspan fill="#e67e22" font-weight="700">AI-native products</tspan>, end to end</text>
  <text x="169" y="146" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#8b949e">full-stack engineer · performance &amp; large-scale migrations</text>
